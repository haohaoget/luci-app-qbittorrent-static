name: Auto Update qbittorrent-nox-static Version

on:
  workflow_dispatch:
  schedule:
     # Runs at 00:00, only on Sunday.
     - cron: '0 0 * * *'

jobs:
  update_version:
    runs-on: ubuntu-latest
    env:
      QB_MAKEFILE_PATH: qbittorrent-nox-static/Makefile
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    # 获取qbittorrent-nox-static的最新版本
    - name: Get latest release version
      id: get_version
      run: |
        # 获取重定向后的页面URL
        redirect_url=$(curl -s -I https://github.com/userdocs/qbittorrent-nox-static/releases/latest | grep -i "Location" | cut -d ' ' -f2)
        
        # 提取完整版本号
        full_version=$(basename "$redirect_url" | sed 's/release-//')

        # 提取主版本号
        main_version=$(echo "$full_version" | cut -d '_' -f 1)

        # 去除回车符
        full_version=$(echo "$full_version" | tr -d '\r' | tr -d '\n')
        main_version=$(echo "$main_version" | tr -d '\r' | tr -d '\n')

        # 传递环境变量
        echo "FULL_VERSION=$full_version" >> $GITHUB_ENV
        echo "MAIN_VERSION=$main_version" >> $GITHUB_ENV

    # 检查是否需要更新版本号
    - name: Check and update Makefile
      id: update_makefile
      run: |
        # 读取当前 Makefile 中的版本号
        old_full_version=$(grep -oP '^PKG_FULL_VERSION:=\K.*' "$QB_MAKEFILE_PATH")
        old_main_version=$(grep -oP '^PKG_VERSION:=\K.*' "$QB_MAKEFILE_PATH")
        old_release=$(grep -oP '^PKG_RELEASE:=\K.*' "$QB_MAKEFILE_PATH")

        echo "Current PKG_FULL_VERSION: $old_full_version"
        echo "Current PKG_VERSION: $old_main_version"
        echo "New PKG_FULL_VERSION: $FULL_VERSION"
        echo "New PKG_VERSION: $MAIN_VERSION"

        # 检查是否需要更新 PKG_VERSION 或 PKG_FULL_VERSION
        if [[ "$FULL_VERSION" != "$old_full_version" || "$MAIN_VERSION" != "$old_main_version" ]]; then
          # 如果 PKG_VERSION 变了，设置 PKG_RELEASE 为 1
          if [[ "$MAIN_VERSION" != "$old_main_version" ]]; then
            new_release=1
          else
            # 如果 PKG_VERSION 没有变，但 PKG_FULL_VERSION 变了，PKG_RELEASE 自加 1
            new_release=$((old_release + 1))
          fi

          # 更新版本号和 PKG_RELEASE
          sed -i "s/^PKG_FULL_VERSION:=.*/PKG_FULL_VERSION:=$FULL_VERSION/" "$QB_MAKEFILE_PATH"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$MAIN_VERSION/" "$QB_MAKEFILE_PATH"
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=$new_release/" "$QB_MAKEFILE_PATH"
          
          echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
        fi

    # 检查更新各个架构的 Hash 值
    - name: Update hashes for different architectures
      id: update_hashes
      run: |
        set -e 
    
        declare -A ARCH_MAPPING=( 
          ["i386"]="x86"
          ["x86_64"]="x86_64"
          ["aarch64"]="aarch64"
          ["arm"]="armv7"
        )
    
        echo "==> Fetching Release metadata from GitHub API"
        API_URL="https://api.github.com/repos/userdocs/qbittorrent-nox-static/releases/tags/release-${FULL_VERSION}"
        RELEASE_JSON=$(curl -sL "$API_URL")

        # 检查是否触发了未授权 API 的速率限制
        if echo "$RELEASE_JSON" | grep -q "API rate limit exceeded"; then
          echo "::error::GitHub API rate limit exceeded. This happens occasionally with unauthenticated API calls on shared GitHub runners."
          exit 1
        fi
    
        for arch in "${!ARCH_MAPPING[@]}"; do
          pkg_arch="${ARCH_MAPPING[$arch]}"
          asset_name="${pkg_arch}-qbittorrent-nox"
    
          echo "---------------------------------------------------"
          echo "==> Checking architecture: ${arch} (${asset_name})"
          
          # 策略 1: 优先从 digest 字段提取 (最可靠的官方防篡改字段)
          hash_value=$(echo "$RELEASE_JSON" | jq -r ".assets[] | select(.name == \"$asset_name\") | .digest // empty" | sed 's/^sha256://')
          
          # 策略 2: 如果 digest 没有，尝试从 label 字段提取
          if [ -z "$hash_value" ] || [ "$hash_value" == "null" ]; then
            hash_value=$(echo "$RELEASE_JSON" | jq -r ".assets[] | select(.name == \"$asset_name\") | .label // empty" | sed 's/^sha256://')
          fi

          # 策略 3: 作为最后手段，尝试从 Release 的 Markdown 文本(body)中精确匹配
          if [ -z "$hash_value" ] || [ "$hash_value" == "null" ]; then
            hash_value=$(echo "$RELEASE_JSON" | jq -r .body | grep -oP "${asset_name}.*sha256:\K[a-f0-9]{64}" || true)
          fi
    
          # 校验是否成功获取到 Hash
          if [ -z "$hash_value" ] || [ "$hash_value" == "null" ]; then
            echo "::error::Failed to retrieve SHA256 hash for ${asset_name}"
            exit 1
          fi
          
          echo "    Retrieved target SHA256 : ${hash_value}"
          
          # 获取当前 Makefile 中该架构的 Hash 值
          old_hash=$(awk "/ifeq (\$(ARCH),$arch)/,/endif/" "$QB_MAKEFILE_PATH" | grep -oP '^\s*PKG_HASH:=\K.*' || true)
          echo "    Current Makefile SHA256 : ${old_hash}"
          
          # 对比 Hash 值是否一致并进行替换
          if [ "$hash_value" == "$old_hash" ]; then
            echo "    ✅ Hash matches. No update needed for $arch."
          else
            echo "    ⚠️ Hash differs. Updating Makefile for $arch..."
            sed -i "/ifeq (\$(ARCH),$arch)/,/endif/ s|PKG_HASH:=.*|PKG_HASH:=$hash_value|" "$QB_MAKEFILE_PATH"
                      
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          fi
          echo ""
        done

    # 提交并推送更改
    - name: Commit and push changes
      if: env.UPDATE_NEEDED == 'true'
      run: |
        # 检查 Makefile 是否存在
        if [ -f "$QB_MAKEFILE_PATH" ]; then
          # 配置 Git 用户信息
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 提交更改
          git add "$QB_MAKEFILE_PATH"
          git commit -m "qbittorrent-nox-static: update to $FULL_VERSION"
          git push
        fi
